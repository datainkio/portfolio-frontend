  });</script><main class="col-span-full"><nav class="breadcrumbs text-sm"><ul><li><a href="/lab/" class="font-semibold">Lab</a></li></ul></nav><article class=""><h1 class="col-span-full">Printer Marks</h1><section class="columns-3"><figure class="break-inside-avoid"><figcaption><h2>Trim Marks</h2><p>PrinterMarks.addTrim(trim, margin)</p><p>Trim marks are small lines placed in the corners of a printed document to indicate where the paper should be cut after printing. They serve as guides for the printer to ensure that the final product is trimmed to the correct size, especially when the design includes elements that extend to the edge of the page (a technique known as bleed).</p><p>The margin parameter supplies the inset for the marks. Since it relies on absolute positioning you'll need to adjust the padding of the container to suit. In this example, margin is set to 16 and the padding for the container is p-8.</p></figcaption><div id="trim-marks" class="p-8 text-neutral"><p>Sint veniam Lorem anim id non deserunt irure deserunt duis. Ex magna do aliqua ex nostrud enim qui est deserunt. Ipsum nisi eiusmod ad duis minim cillum Lorem adipisicing laboris fugiat voluptate exercitation enim do. Ex laborum commodo nostrud officia adipisicing eu aliqua laboris cupidatat consequat. Veniam voluptate nulla eu exercitation commodo laboris est dolor.</p></div></figure><figure class="break-inside-avoid"><figcaption><h2>Registration Bar</h2><p>PrinterMarks.addRegistrationBar(registration, 4)</p><p>Registration marks are specialized indicators used in the printing process to ensure that each color layer aligns correctly. They are essential when multiple colors are printed separately and then combined to produce the final image. These marks help printers achieve precise color registration, avoiding misalignment that can cause blurry or offset images</p></figcaption><div id="registration-bar" class="text-neutral w-auto"><p>Eiusmod exercitation ipsum ea labore ullamco. Laboris nisi mollit ullamco officia eiusmod ex. Fugiat Lorem adipisicing elit dolor fugiat ex. Reprehenderit amet ad et consectetur ullamco exercitation ea commodo amet velit sit. Lorem ea quis commodo ullamco quis fugiat velit sint. Ea amet in voluptate quis sit commodo do cillum veniam. Ea quis aliqua excepteur ipsum.</p></div></figure><figure class="break-inside-avoid"><figcaption><h2>Bleed Marks</h2><p>PrinterMarks.addBleed(bleed, 8)</p><p>Bleed marks refer to the areas of a printed document that extend beyond the final trim size. They ensure that images, colors, or design elements that are intended to reach the edge of the paper do so without leaving unintended white borders. Bleed marks are crucial for achieving a professional, edge-to-edge appearance in printed materials.</p><p>During the trimming process, slight variations can occur. Bleed ensures that even if the paper shifts slightly, the design still extends to the edge without leaving white margins.</p></figcaption><div id="bleed-marks" class="text-neutral"><p>Est nulla sunt aliqua sunt veniam tempor Lorem anim deserunt. Eiusmod proident deserunt ut occaecat voluptate veniam aliqua dolore ex sint amet adipisicing tempor. Cupidatat enim deserunt quis sit pariatur nulla duis sunt consequat Lorem non reprehenderit minim. Amet Lorem eiusmod ad excepteur deserunt qui anim id velit ex aliquip in. Fugiat pariatur do do id aliqua officia commodo cillum eu deserunt excepteur ipsum commodo. Consequat culpa do irure voluptate anim commodo. In irure dolor consectetur excepteur nulla cillum nostrud anim nulla officia ad in Lorem ea.</p></div></figure></section><script type="module">import * as PrinterMarks from '/assets/js/displays/PrinterMarks.js';
